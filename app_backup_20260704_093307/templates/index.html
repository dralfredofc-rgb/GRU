{% set dias = range(1, 32) %}
{% set meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'] %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Medicsafc / Pacientes</title>
  <style>
    :root{--bg:#f4f8fc;--card:#ffffff;--ink:#112640;--muted:#4b6280;--line:#dbe5f2;--accent:#0f2b4c}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}
    .wrap{max-width:1200px;margin:0 auto;padding:18px}
    .card{background:var(--card);border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:16px 18px;margin-bottom:16px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .topbar h1{margin:0;font-size:1.35rem}
    .layout{display:grid;grid-template-columns:1fr;gap:16px}
    @media(min-width:980px){.layout.split{grid-template-columns:minmax(0,1.1fr) minmax(0,1.4fr)}}
    fieldset{border:1px solid var(--line);border-radius:8px;padding:10px}
    legend{font-weight:700;color:var(--accent)}
    label{display:block;font-size:.95rem;color:#224a7b;margin:7px 0}
    input,select,textarea{width:100%;padding:9px 10px;border:1px solid #c6d6ea;border-radius:6px;font-size:.98rem}
    textarea{min-height:72px;resize:vertical}
    .row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .row3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}
    button{background:var(--accent);color:#fff;border:none;padding:9px 12px;border-radius:6px;cursor:pointer}
    button.secondary{background:#e2eaf5;color:var(--accent)}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:10px;border-bottom:1px solid var(--line);font-size:.95rem}
    th{background:#edf2fb;color:var(--accent)}
    .empty{color:var(--muted);font-style:italic}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    .tag{background:#e8f0ff;color:var(--accent);border-radius:999px;padding:3px 10px;font-size:.85rem;display:inline-block}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="topbar">
      <h1>Medicsafc / Pacientes</h1>
      <span class="tag" id="status">Pacientes</span>
    </div>
  </div>

  <div class="layout split">
    <div class="card">
      <form id="pacienteForm" autocomplete="off">
        <fieldset>
          <legend>Datos básicos</legend>
          <label>Tipo de paciente
            <select name="tipo_paciente">
              <option>Paciente nuevo</option>
              <option>Paciente registrado</option>
            </select>
          </label>
          <label>Paciente seleccionado
            <input type="text" name="paciente_seleccionado" placeholder="Código / nombre del paciente seleccionado" />
          </label>
          <label>Nombre completo
            <input type="text" name="nombre_completo" required />
          </label>
          <div class="row">
            <label>Día de nacimiento
              <select name="dia_nacimiento">
                <option value="">Día</option>
                {% for i in dias %}<option value="{{ i }}">{{ i }}</option>{% endfor %}
              </select>
            </label>
            <label>Mes de nacimiento
              <select name="mes_nacimiento">
                <option value="">Mes</option>
                {% for m in meses %}<option value="{{ m }}">{{ m }}</option>{% endfor %}
              </select>
            </label>
          </div>
          <label>Año de nacimiento
            <input type="number" name="anio_nacimiento" min="1900" max="2100" placeholder="YYYY" />
          </label>
          <label>Correo
            <input type="email" name="correo" />
          </label>
          <label>Teléfono
            <input type="tel" name="telefono" />
          </label>
        </fieldset>

        <fieldset>
          <legend>Datos clínicos</legend>
          <div class="row3">
            <label>Peso (kg)
              <input type="number" step="0.1" name="peso" />
            </label>
            <label>Talla (cm)
              <input type="number" step="0.1" name="talla" />
            </label>
            <label>Sexo
              <select name="sexo">
                <option value="">Seleccione</option>
                <option>Femenino</option>
                <option>Masculino</option>
                <option>Otro</option>
              </select>
            </label>
          </div>
          <label>Alergias
            <textarea name="alergias" placeholder="Ej.: Penicilina, polen..."></textarea>
          </label>
          <label>Antecedentes
            <textarea name="antecedentes" placeholder="Enfermedades, cirugías, hábitos..."></textarea>
          </label>
          <label>Notas
            <textarea name="notas" placeholder="Motivo de consulta u observaciones..."></textarea>
          </label>
        </fieldset>

        <fieldset>
          <legend>Sistema (opcional)</legend>
          <label>Paciente ID
            <input type="text" name="paciente_id" />
          </label>
          <label>Nombre paciente detectado
            <input type="text" name="nombre_paciente_detectado" />
          </label>
          <label>URL chat detectado
            <input type="url" name="url_chat_detectado" />
          </label>
        </fieldset>

        <div class="actions">
          <button type="submit">Guardar paciente</button>
        </div>
      </form>
    </div>

    <div class="card">
      <div class="toolbar">
        <input type="search" id="search" placeholder="Buscar por nombre..." oninput="renderReport()" style="max-width:280px" />
        <button class="secondary" onclick="exportCSV()">Exportar CSV</button>
      </div>
      <div id="report">Cargando...</div>
    </div>
  </div>
</div>

<script>
const API='/api/pacientes';
async function load(){
  try{
    const res = await fetch(API);
    if(!res.ok){document.getElementById('report').innerHTML='Error cargando';return;}
    const data = await res.json();
    window.__cache = data || [];
  }catch(e){document.getElementById('report').innerHTML='Error de red';}
  renderReport();
}
async function save(){
  const form = document.getElementById('pacienteForm');
  const fd = new FormData(form);
  const obj = {
    tipo_paciente: (fd.get('tipo_paciente')||'').trim(),
    paciente_seleccionado: (fd.get('paciente_seleccionado')||'').trim(),
    nombre_completo: (fd.get('nombre_completo')||'').trim(),
    dia_nacimiento: (fd.get('dia_nacimiento')||'').trim(),
    mes_nacimiento: (fd.get('mes_nacimiento')||'').trim(),
    anio_nacimiento: (fd.get('anio_nacimiento')||'').trim(),
    correo: (fd.get('correo')||'').trim(),
    telefono: (fd.get('telefono')||'').trim(),
    sexo: (fd.get('sexo')||'').trim(),
    peso: fd.get('peso') ? Number(fd.get('peso')) : null,
    talla: fd.get('talla') ? Number(fd.get('talla')) : null,
    alergias: (fd.get('alergias')||'').trim(),
    antecedentes: (fd.get('antecedentes')||'').trim(),
    notas: (fd.get('notas')||'').trim(),
    paciente_id: (fd.get('paciente_id')||'').trim(),
    nombre_paciente_detectado: (fd.get('nombre_paciente_detectado')||'').trim(),
    url_chat_detectado: (fd.get('url_chat_detectado')||'').trim(),
    fecha_nacimiento: fns('anio_nacimiento','mes_nacimiento','dia_nacimiento')
  };
  const res = await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(obj)});
  if(!res.ok){alert('Error al guardar');return;}
  form.reset();
  load();
}
function fns(a,b,c){
  const y=(document.querySelector('[name="'+a+'"]').value||'').trim();
  const m=(document.querySelector('[name="'+b+'"]').value||'').trim();
  const d=(document.querySelector('[name="'+c+'"]').value||'').trim();
  if(y && m && d) return y+'-'+m+'-'+d;
  return '';
}
function escape(s){ return String(s??'—').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function imc(peso,talla){
  if(!peso || !talla) return '';
  const v=(peso/Math.pow(talla/100,2)).toFixed(1);
  return 'IMC '+v;
}
function renderReport(){
  const list = window.__cache || [];
  const q = (document.getElementById('search').value||'').toLowerCase().trim();
  const filtered = q ? list.filter(r=>(r.nombre_completo||'').toLowerCase().includes(q)) : list;
  const box=document.getElementById('report');
  if(!filtered.length){ box.innerHTML='<p class="empty">Sin registros.</p>'; return; }
  const rows=filtered.map(r=>`<tr>
    <td>${escape(r.nombre_completo)}</td>
    <td>${escape(r.fecha_nacimiento||(r.dia_nacimiento&&r.mes_nacimiento&&r.anio_nacimiento?r.dia_nacimiento+' '+r.mes_nacimiento+' '+r.anio_nacimiento:'—'))}</td>
    <td>${escape(r.sexo||'—')}</td>
    <td>${escape(r.tipo_paciente||'—')}</td>
    <td>${r.peso??'—'} / ${r.talla??'—'}${r.peso && r.talla ? ' <span class="tag">'+imc(r.peso,r.talla)+'</span>' : ''}</td>
    <td>${escape(r.correo||'—')}</td>
    <td>${escape(r.telefono||'—')}</td>
    <td>${escape(r.alergias||'—')}</td>
    <td>${escape(r.creado_en||'—')}</td>
  </tr>`).join('');
  box.innerHTML=`<p class="empty" style="margin-bottom:8px">${filtered.length} paciente(s)</p><div style="overflow:auto"><table>
    <thead><tr><th>Paciente</th><th>Nacimiento</th><th>Sexo</th><th>Tipo</th><th>Peso / talla</th><th>Correo</th><th>Teléfono</th><th>Alergias</th><th>Creado</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}
function exportCSV(){
  const list=window.__cache||[];
  if(!list.length){alert('No hay registros');return;}
  const header=['Nombre','Nacimiento','Sexo','Tipo','Peso','Talla','Correo','Teléfono','Alergias','Antecedentes','Notas','Creado'];
  const rows=[header];
  list.forEach(r=>rows.push([r.nombre_completo,(r.fecha_nacimiento||'')||([r.dia_nacimiento,r.mes_nacimiento,r.anio_nacimiento].join(' ')),r.sexo||'',r.tipo_paciente||'',r.peso||'',r.talla||'',r.correo||'',r.telefono||'',r.alergias||'',r.antecedentes||'',r.notas||'',r.creado_en||'']));
  const csv=rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'\"')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='pacientes_medicsafc.csv';
  a.click();
}
document.getElementById('pacienteForm').addEventListener('submit',function(e){e.preventDefault();save();});
window.addEventListener('load',load);
</script>
</body>
</html>
